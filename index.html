<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>अग्निशमन रजा नोंद प्रणाली - Continuous</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #ffcdd2; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-add { background-color: #2e7d32; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .btn-add:hover { background-color: #1b5e20; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #d32f2f; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .balance-info { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; font-weight: bold; border: 1px solid #bbdefb; }
    </style>
</head>
<body>

<div class="container">
    <h2>अग्निशमन रजा नोंदणी पुस्तिका</h2>

    <div class="balance-info">
        <span>चालू शिल्लक हक्काची रजा (K4): <span id="cur_el">0.00</span></span>
        <span>चालू शिल्लक मेडिकल रजा (L4): <span id="cur_ml">0.00</span></span>
    </div>

    <div class="grid">
        <div>
            <label>सुरवातीचा हजर दिनांक (A):</label>
            <input type="date" id="a_start">
        </div>
        <div>
            <label>शेवटचा हजर दिनांक (B):</label>
            <input type="date" id="b_end">
        </div>
        <div>
            <label>बिन पगारी रजा LWP (E):</label>
            <input type="number" id="e_lwp" value="0">
        </div>
        <div>
            <label>रजा संपल्याचा दिनांक (P):</label>
            <input type="date" id="p_leave_end">
        </div>
        <div>
            <label>रजेचा प्रकार (Q):</label>
            <select id="q_type">
                <option value="हक्काची रजा">हक्काची रजा</option>
                <option value="वैद्यकीय रजा">वैद्यकीय रजा</option>
                <option value="विशेष रजा">विशेष रजा</option>
            </select>
        </div>
        <div>
            <label>कृती:</label>
            <button class="btn-add" onclick="addEntry()">एंट्री जतन करा (Save)</button>
        </div>
    </div>

    <h3>नोंदींचा तक्ता (Leave Record Table)</h3>
    <table id="recordTable">
        <thead>
            <tr>
                <th>हजर दिनांक (A-B)</th>
                <th>हजर दिवस (F)</th>
                <th>साठलेली EL (G)</th>
                <th>साठलेली ML (H)</th>
                <th>रजा प्रकार (Q)</th>
                <th>रजा दिवस (R)</th>
                <th>शिल्लक EL (Z)</th>
                <th>शिल्लक ML (AA)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    
    <button onclick="window.print()" style="margin-top:20px; padding: 10px;">प्रिंट काढा</button>
</div>

<script>
    // सुरुवातीची सेटिंग्ज (ही तुमच्या गरजेनुसार बदलू शकता)
    let currentEL = 0.00; 
    let currentML = 0.00;

    // पेज लोड झाल्यावर यूजरला सुरुवातीचा बॅलन्स विचारणे (फक्त पहिल्यांदा)
    window.onload = function() {
        let startEL = prompt("सुरुवातीची शिल्लक हक्काची रजा (Z3) टाका:", "0");
        let startML = prompt("सुरुवातीची शिल्लक मेडिकल रजा (AA3) टाका:", "0");
        let lastDate = prompt("मागील रजा संपल्याचा दिनांक (P3) टाका (YYYY-MM-DD):", "2024-01-01");
        
        currentEL = parseFloat(startEL) || 0;
        currentML = parseFloat(startML) || 0;
        
        document.getElementById('cur_el').innerText = currentEL.toFixed(2);
        document.getElementById('cur_ml').innerText = currentML.toFixed(2);
        
        // पुढचा हजर दिनांक सेट करणे
        let nextDay = new Date(lastDate);
        nextDay.setDate(nextDay.getDate() + 1);
        document.getElementById('a_start').value = nextDay.toISOString().split('T')[0];
    };

    function addEntry() {
        let a = new Date(document.getElementById('a_start').value);
        let b = new Date(document.getElementById('b_end').value);
        let e = parseFloat(document.getElementById('e_lwp').value) || 0;
        let p = new Date(document.getElementById('p_leave_end').value);
        let q = document.getElementById('q_type').value;

        if (isNaN(a) || isNaN(b) || isNaN(p)) {
            alert("कृपया सर्व तारखा अचूक भरा!");
            return;
        }

        // १. हजर दिवसांचा हिशोब (D आणि F)
        let diff = Math.ceil(Math.abs(b - a) / (1000 * 60 * 60 * 24)) + 1;
        let f = diff - e;

        // २. साठलेली रजा (G आणि H) - तुमच्या ११ आणि ३० दिवसांच्या फॉर्म्युल्यानुसार
        let g = Math.floor(f / 11) + (f % 11) / 100;
        let h = Math.floor(f / 30) + (f % 30) / 100;

        // ३. एकूण साठलेली रजा (K आणि L प्रमाणे)
        let z3_int = Math.floor(currentEL);
        let z3_mod = Math.round((currentEL % 1) * 100);
        let g_int = Math.floor(g);
        let g_mod = Math.round((g % 1) * 100);
        let k_val = Math.min(365, z3_int + g_int + Math.floor((z3_mod + g_mod)/11) + ((z3_mod + g_mod)%11)/100);

        let aa3_int = Math.floor(currentML);
        let aa3_mod = Math.round((currentML % 1) * 100);
        let h_int = Math.floor(h);
        let h_mod = Math.round((h % 1) * 100);
        let l_val = Math.min(120, aa3_int + h_int + Math.floor((aa3_mod + h_mod)/30) + ((aa3_mod + h_mod)%30)/100);

        // ४. घेतलेली रजा (R)
        let o = new Date(b);
        o.setDate(o.getDate() + 1);
        let r_diff = Math.ceil(Math.abs(p - o) / (1000 * 60 * 60 * 24)) + 1;

        // ५. नवीन शिल्लक रजा (Z आणि AA प्रमाणे)
        let finalEL, finalML;
        if (q === "हक्काची रजा") {
            finalEL = (r_diff >= Math.floor(k_val)) ? (k_val % 1) : (Math.floor(k_val) - r_diff + (k_val % 1));
            finalML = l_val;
        } else if (q === "वैद्यकीय रजा") {
            finalEL = Math.min(365, Math.max(0, Math.floor(k_val) - Math.max(0, r_diff - Math.floor(l_val)) + (k_val % 1)));
            finalML = (r_diff >= Math.floor(l_val)) ? (l_val % 1) : (Math.floor(l_val) - r_diff + (l_val % 1));
        } else {
            finalEL = k_val;
            finalML = l_val;
        }

        // ६. तक्त्यात माहिती भरणे
        let table = document.getElementById("recordTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow();
        row.innerHTML = `
            <td>${a.toLocaleDateString('en-GB')} - ${b.toLocaleDateString('en-GB')}</td>
            <td>${f}</td>
            <td>${g.toFixed(2)}</td>
            <td>${h.toFixed(2)}</td>
            <td>${q}</td>
            <td>${r_diff}</td>
            <td>${finalEL.toFixed(2)}</td>
            <td>${finalML.toFixed(2)}</td>
        `;

        // ७. पुढच्या एंट्रीसाठी सेटिंग्ज अपडेट करणे
        currentEL = finalEL;
        currentML = finalML;
        document.getElementById('cur_el').innerText = currentEL.toFixed(2);
        document.getElementById('cur_ml').innerText = currentML.toFixed(2);

        // पुढचा हजर दिनांक = रजा संपल्याचा दिनांक + १
        let nextA = new Date(p);
        nextA.setDate(nextA.getDate() + 1);
        document.getElementById('a_start').value = nextA.toISOString().split('T')[0];
        
        // इतर फील्ड रिकामी करणे
        document.getElementById('b_end').value = "";
        document.getElementById('p_leave_end').value = "";
    }
</script>

</body>
</html>
