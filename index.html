<!-- खालील JavaScript कोड existing <script> मध्ये add करा -->
<script>

    // शेवटची नोंद Delete करण्यासाठी Backup Variables
    let historyStack = [];

    // addEntry() फंक्शनमध्ये row.innerHTML च्या आधी हा code add करा
    historyStack.push({
        currentEL: currentEL,
        currentML: currentML,
        a_start: document.getElementById('a_start').value
    });

    // नवीन function
    function deleteLastEntry() {

        let table = document.getElementById("recordTable").getElementsByTagName('tbody')[0];

        if (table.rows.length === 0) {
            alert("Delete करण्यासाठी कोणतीही नोंद उपलब्ध नाही!");
            return;
        }

        // शेवटची row delete
        table.deleteRow(table.rows.length - 1);

        // मागील values restore
        let lastState = historyStack.pop();

        if (lastState) {
            currentEL = lastState.currentEL;
            currentML = lastState.currentML;
            document.getElementById('a_start').value = lastState.a_start;
        }

        // जर सर्व entries delete झाल्या तर setup पुन्हा enable करा
        if (table.rows.length === 0) {

            isFirstEntry = true;

            document.getElementById('p3_date').disabled = false;
            document.getElementById('z3_bal').disabled = false;
            document.getElementById('aa3_bal').disabled = false;
        }

        // input fields clear
        document.getElementById('b_end').value = "";
        document.getElementById('o_leave_start').value = "";
        document.getElementById('p_leave_end').value = "";
    }

</script>
