<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>अग्निशमन रजा नोंद प्रणाली - अद्ययावत मर्यादा</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
        .setup-box { background: #e3f2fd; padding: 15px; border-radius: 8px; border: 1px solid #bbdefb; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .entry-box { background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #ffcdd2; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input:disabled, input[readonly] { background-color: #eee; color: #555; }
        .btn-add { background-color: #2e7d32; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 18px; }
        .btn-add:hover { background-color: #1b5e20; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #d32f2f; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .highlight { font-weight: bold; color: #d32f2f; background: #fffde7; }
    </style>
</head>
<body>

<div class="container">
    <h2>अग्निशमन रजा नोंदणी पुस्तिका</h2>

    <div class="setup-box" id="initialSetup">
        <div>
            <label>मागील रजा संपल्याचा दिनांक (P3):</label>
            <input type="date" id="p3_date" onchange="setFirstStartDate()">
        </div>
        <div>
            <label>सुरुवातीची शिल्लक EL (Z3):</label>
            <input type="number" step="0.01" id="z3_bal" placeholder="उदा. 10.05">
        </div>
        <div>
            <label>सुरुवातीची शिल्लक ML (AA3):</label>
            <input type="number" step="0.01" id="aa3_bal" placeholder="उदा. 5.12">
        </div>
    </div>

    <div class="entry-box">
        <div>
            <label>सुरवातीचा हजर दिनांक (A):</label>
            <input type="date" id="a_start" readonly>
        </div>
        <div>
            <label>शेवटचा हजर दिनांक (B):</label>
            <input type="date" id="b_end" onchange="updateLeaveStartDate()">
        </div>
        <div>
            <label>बिन पगारी रजा LWP (E):</label>
            <input type="number" id="e_lwp" value="0">
        </div>
        <div>
            <label>रजेवर गेल्याचा दिनांक (O):</label>
            <input type="date" id="o_leave_start" readonly>
        </div>
        <div>
            <label>रजा संपल्याचा दिनांक (P):</label>
            <input type="date" id="p_leave_end">
        </div>
        <div>
            <label>रजेचा प्रकार (Q):</label>
            <select id="q_type">
                <option value="हक्काची रजा">हक्काची रजा</option>
                <option value="वैद्यकीय रजा">वैद्यकीय रजा</option>
                <option value="विशेष रजा">विशेष रजा</option>
            </select>
        </div>
        <div>
            <button class="btn-add" onclick="addEntry()">जतन करा (Save Entry)</button>
        </div>
    </div>

    <h3>नोंदींचा तक्ता (Leave Record Table)</h3>
    <table id="recordTable">
        <thead>
            <tr>
                <th>हजर दिनांक (A-B)</th>
                <th>हजर दिवस (F)</th>
                <th>साठलेली EL (G)</th>
                <th>साठलेली ML (H)</th>
                <th>गैरहजर दिनांक (O-P)</th>
                <th>रजा प्रकार (Q)</th>
                <th>रजा दिवस (R)</th>
                <th>अंतिम शिल्लक EL (Z)</th>
                <th>अंतिम शिल्लक ML (AA)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let currentEL = null;
    let currentML = null;
    let isFirstEntry = true;

    function setFirstStartDate() {
        if(isFirstEntry) {
            let p3Val = document.getElementById('p3_date').value;
            if(p3Val) {
                let p3 = new Date(p3Val);
                let nextA = new Date(p3);
                nextA.setDate(nextA.getDate() + 1);
                document.getElementById('a_start').value = nextA.toISOString().split('T')[0];
            }
        }
    }

    function updateLeaveStartDate() {
        let bVal = document.getElementById('b_end').value;
        if(bVal) {
            let bDate = new Date(bVal);
            let oDate = new Date(bDate);
            oDate.setDate(oDate.getDate() + 1);
            document.getElementById('o_leave_start').value = oDate.toISOString().split('T')[0];
        }
    }

    function addEntry() {
        let a = new Date(document.getElementById('a_start').value);
        let b = new Date(document.getElementById('b_end').value);
        let e = parseFloat(document.getElementById('e_lwp').value) || 0;
        let o = new Date(document.getElementById('o_leave_start').value);
        let p = new Date(document.getElementById('p_leave_end').value);
        let q = document.getElementById('q_type').value;

        if (isNaN(a) || isNaN(b) || isNaN(p)) {
            alert("कृपया सर्व तारखा भरा!");
            return;
        }

        if (isFirstEntry) {
            currentEL = parseFloat(document.getElementById('z3_bal').value) || 0;
            currentML = parseFloat(document.getElementById('aa3_bal').value) || 0;
            document.getElementById('p3_date').disabled = true;
            document.getElementById('z3_bal').disabled = true;
            document.getElementById('aa3_bal').disabled = true;
            isFirstEntry = false;
        }

        // हजर दिवस (F)
        let diff = Math.ceil(Math.abs(b - a) / (1000 * 60 * 60 * 24)) + 1;
        let f = diff - e;

        // साठलेली रजा मोजणी (G आणि H)
        let g = Math.floor(f / 11) + (f % 11) / 100;
        let h = Math.floor(f / 30) + (f % 30) / 100;

        // एकूण साठलेली रजा (Limits applied)
        let z3_int = Math.floor(currentEL);
        let z3_mod = Math.round((currentEL % 1) * 100);
        let g_int = Math.floor(g);
        let g_mod = Math.round((g % 1) * 100);
        let k_val = Math.min(365, z3_int + g_int + Math.floor((z3_mod + g_mod)/11) + ((z3_mod + g_mod)%11)/100);

        let aa3_int = Math.floor(currentML);
        let aa3_mod = Math.round((currentML % 1) * 100);
        let h_int = Math.floor(h);
        let h_mod = Math.round((h % 1) * 100);
        let l_val = Math.min(120, aa3_int + h_int + Math.floor((aa3_mod + h_mod)/30) + ((aa3_mod + h_mod)%30)/100);

        // घेतलेली रजा (R)
        let r_diff = Math.ceil(Math.abs(p - o) / (1000 * 60 * 60 * 24)) + 1;

        // अंतिम शिल्लक मोजणी (Z आणि AA)
        let finalEL, finalML;
        if (q === "हक्काची रजा") {
            finalEL = (r_diff >= Math.floor(k_val)) ? (k_val % 1) : (Math.floor(k_val) - r_diff + (k_val % 1));
            finalML = l_val;
        } else if (q === "वैद्यकीय रजा") {
            finalEL = Math.min(365, Math.max(0, Math.floor(k_val) - Math.max(0, r_diff - Math.floor(l_val)) + (k_val % 1)));
            finalML = (r_diff >= Math.floor(l_val)) ? (l_val % 1) : (Math.floor(l_val) - r_diff + (l_val % 1));
        } else {
            finalEL = k_val;
            finalML = l_val;
        }

        // कडक मर्यादा तपासणी (Strict Max Limit Check)
        if (finalEL > 365) finalEL = 365 + (finalEL % 1); // पूर्णांक ३६५ वर मर्यादित
        if (finalML > 120) finalML = 120 + (finalML % 1); // पूर्णांक १२० वर मर्यादित

        // तक्त्यात नोंद करणे
        let table = document.getElementById("recordTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow();
        row.innerHTML = `
            <td>${a.toLocaleDateString('en-GB')} - ${b.toLocaleDateString('en-GB')}</td>
            <td>${f}</td>
            <td>${g.toFixed(2)}</td>
            <td>${h.toFixed(2)}</td>
            <td>${o.toLocaleDateString('en-GB')} - ${p.toLocaleDateString('en-GB')}</td>
            <td>${q}</td>
            <td>${r_diff}</td>
            <td class="highlight">${finalEL.toFixed(2)}</td>
            <td class="highlight">${finalML.toFixed(2)}</td>
        `;

        // पुढील एंट्रीसाठी डेटा सेट करणे
        currentEL = finalEL;
        currentML = finalML;
        let nextA = new Date(p);
        nextA.setDate(nextA.getDate() + 1);
        document.getElementById('a_start').value = nextA.toISOString().split('T')[0];
        
        // फॉर्म साफ करणे
        document.getElementById('b_end').value = "";
        document.getElementById('o_leave_start').value = "";
        document.getElementById('p_leave_end').value = "";
    }
</script>
</body>
</html>
